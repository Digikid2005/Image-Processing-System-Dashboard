<!DOCTYPE html>
<html>
<head>
    <title>Athena Login</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 100px; background-color: #121212; color: white;">
    <h2>Athena Vision Login</h2>
    {% if error %}<p style="color: #ff4d4d;">{{ error }}</p>{% endif %}
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required style="padding: 10px; margin-bottom: 10px; border-radius: 4px;"><br>
        <input type="password" name="password" placeholder="Password" required style="padding: 10px; margin-bottom: 20px; border-radius: 4px;"><br>
        <button type="submit" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Login</button>
    </form>
</body>
</html>
