<!DOCTYPE html>
<html>
<head>
    <title>Athena Vision Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;}
        .card { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .video-box { width: 100%; height: 450px; background-color: #000; border-radius: 8px; object-fit: contain; }
	.alerts-panel { background: #1a1a2e; border: 1px solid #16213e; border-radius: 8px; margin-top: 15px; overflow: hidden; display: flex; flex-direction: column; height: 220px; }
        .alerts-header { background: #0f3460; color: #fff; padding: 10px 15px; font-weight: bold; font-size: 14px; border-bottom: 1px solid #16213e; display: flex; justify-content: space-between; align-items: center;}
        .alerts-container { padding: 10px 15px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; background: #0b0c10; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .alert-row { font-size: 13px; padding: 8px; border-radius: 4px; border-left: 4px solid transparent; background: #1f2833; display: flex; gap: 10px; align-items: flex-start; word-wrap: break-word;}
        .alert-time { color: #66fcf1; font-weight: bold; white-space: nowrap; font-family: monospace; font-size: 12px; margin-top: 2px;}
        .alert-content { flex-grow: 1; line-height: 1.4; color: #c5c6c7;}
        .ai-results-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .img-preview { width: 100%; height: 250px; background: #000; border-radius: 4px; border: 1px dashed #555; display: flex; align-items: center; justify-content: center; color: #777; object-fit: contain;}
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; width: 100%; margin-bottom: 10px; font-weight: bold;}
        button:hover { background: #0056b3; }
        input[type="file"] { margin-bottom: 10px; color: #fff;}
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Athena Vision Command Center</h2>
        <a href="/logout" style="color: #ff4d4d; text-decoration: none; font-weight: bold;">[ Logout ]</a>
    </div>
    
    <div class="grid-container">
        <div class="card">
            <h3>Live Network Stream</h3>
            <img src="{{ url_for('video_feed') }}" class="video-box" id="media-player">
            <div class="alerts-panel">
                <div class="alerts-header">
                    <span>DSP Health & System Alerts</span>
                    <span style="font-size: 12px; font-weight: normal; color: #45a29e;">● Monitoring</span>
                </div>
                <div class="alerts-container" id="alerts-container">
                    </div>
            </div>
        </div>

        <div class="card">
            <h3>Local Media Override</h3>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <input type="file" name="media_file" accept="video/*,image/*" required>
                <button type="submit" style="background: #28a745;">Upload & Play Media</button>
            </form>
            
            <hr style="border-color: #333; margin: 20px 0;">
            
            <h3>Network Camera (IP/PTZ)</h3>
	    <input type="text" id="ip_cam_url" placeholder="e.g. http://192.168.1.5:8080/video" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border-radius: 4px; border: 1px solid #555; background: #222; color: white;">
            <button onclick="connectIPCamera()" style="background: #fd7e14;">Update Network Stream</button>

            <hr style="border-color: #333; margin: 20px 0;">

            <h3>AI Processing Actions</h3>
            <button onclick="takeScreenshot()">Take Screenshot (Save to DB)</button>
            <button onclick="triggerSR()" style="background: #6f42c1;">Run Image Enhancement</button>
        </div>
    </div>

    <div class="ai-results-grid">
        <div class="card">
            <h3>Enhancement Window (Before & After)</h3>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1; text-align: center;">
                    <span style="font-size: 12px; color: #aaa;">Original</span>
                    <img id="img-original" class="img-preview" src="" style="display: none;">
                </div>
                <div style="flex: 1; text-align: center;">
                    <span style="font-size: 12px; color: #aaa;">Enhanced Image (Real-ESRGAN)</span>
                    <img id="img-enhanced" class="img-preview" src="" style="display: none;">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('keydown', function(event) {
            if(event.key === 's' || event.key === 'S') { takeScreenshot(); }
        });
	function fetchLogs() {
            fetch('/api/logs').then(r => r.json()).then(data => {
                const container = document.getElementById('alerts-container');
                container.innerHTML = ''; // Clear old logs

                // Iterate through the logs backwards to show newest first
                data.logs.slice().reverse().forEach(logString => {
                    // Logs arrive formatted like: "[13:15:23] Message content here"
                    // We split it to extract the timestamp and the message separately
                    const match = logString.match(/^\[(.*?)\] (.*)$/);

                    if (match) {
                        const time = match[1];
                        const message = match[2];

                        // Create the structural elements
                        const row = document.createElement('div');
                        row.className = 'alert-row';

                        const timeSpan = document.createElement('span');
                        timeSpan.className = 'alert-time';
                        timeSpan.textContent = `[${time}]`;

                        const msgSpan = document.createElement('span');
                        msgSpan.className = 'alert-content';
                        msgSpan.innerHTML = message; // Use innerHTML to preserve your color coding

                        // Determine border color based on the message content
                        if (message.includes("CRITICAL")) {
                            row.style.borderLeftColor = "#ff4444";
                            row.style.backgroundColor = "rgba(255, 68, 68, 0.1)";
                        } else if (message.includes("ALERT")) {
                            row.style.borderLeftColor = "#ff8800";
                            row.style.backgroundColor = "rgba(255, 136, 0, 0.1)";
                        } else if (message.includes("Clear")) {
                            row.style.borderLeftColor = "#00ff00";
                        } else {
                            row.style.borderLeftColor = "#007bff"; // Default system log
                        }

                        // Assemble and inject
                        row.appendChild(timeSpan);
                        row.appendChild(msgSpan);
                        container.appendChild(row);
                    }
                });
            });
        }
        setInterval(fetchLogs, 1500);

        function fetchLatestImages() {
            fetch('/api/latest_results')
                .then(r => r.json())
                .then(data => {
                    if(data.original) {
                        document.getElementById('img-original').src = data.original;
                        document.getElementById('img-original').style.display = 'block';
                    }
                    if(data.enhanced) {
                        document.getElementById('img-enhanced').src = data.enhanced;
                        document.getElementById('img-enhanced').style.display = 'block';
                    }
                });
        }
        setInterval(fetchLatestImages, 3000);

        function connectIPCamera() {
            const camUrl = document.getElementById('ip_cam_url').value;
            if (!camUrl) { alert("Please enter a valid IP Camera URL."); return; }
            fetch('/api/ip_camera', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ camera_url: camUrl })
            });
        }

        function takeScreenshot() { fetch('/api/screenshot', {method: 'POST'}); }
        function triggerSR() { fetch('/api/super_resolution', {method: 'POST'}); }
    </script>
</body>
</html>
